<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLMOTOSYNC | Diagnóstico Avanzado</title>
    <style>
        /* --- FONDO TÉCNICO METALIZADO --- */
        body {
            background: linear-gradient(180deg, #0f141e 0%, #0a0a0f 50%, #050508 100%) !important;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* --- HEADER Y LOGO GIGANTE --- */
        .header-principal {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(10, 10, 15, 0.98); 
            transition: all 0.5s ease;
            z-index: 1000;
            padding: 30px 0;
            border-bottom: 3px solid #FF6600;
        }

        .header-pequeno { padding: 10px 0 !important; }

        #logo-ams {
            width: 500px; /* TU LOGO GIGANTE REUPERADO */
            max-width: 90%;
            transition: 0.5s ease;
            filter: drop-shadow(0px 0px 15px rgba(255, 102, 0, 0.4));
        }

        .logo-reducido { width: 240px !important; }

        .relleno-header { height: 350px; }

        /* --- SECCIÓN HERO (LA FOTO DE LA KTM) --- */
        .hero-section {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('MANTENIMIENTO 1290.jpg');
            background-size: cover;
            background-position: center;
            padding: 120px 20px;
            border-bottom: 2px solid #FF6600;
        }

        /* --- TARJETAS DE SERVICIOS --- */
        .contenedor-tarjetas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 80px 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .tarjeta-servicio {
            width: 300px;
            padding: 50px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 102, 0, 0.3);
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: 0.4s ease;
        }

        /* Capa oscura interna para que el texto se lea bien */
        .tarjeta-servicio::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 25, 0.85);
            z-index: 1;
            transition: 0.3s;
        }

        .tarjeta-servicio:hover {
            transform: translateY(-15px);
            border-color: #FF6600;
            box-shadow: 0px 0px 40px rgba(255, 102, 0, 0.4);
        }

        .tarjeta-servicio:hover::before { background: rgba(10, 15, 25, 0.7); }

        .contenido-tarjeta { position: relative; z-index: 2; }
        .titulo-serv { color: #FF6600; text-transform: uppercase; font-weight: 800; margin-bottom: 15px; }

        /* --- SECCIÓN CONTACTO --- */
        .seccion-contacto {
            background-color: #0a0a0f;
            padding: 80px 20px;
            border-top: 2px solid #333;
        }

        .neon-v { color: #ccff00; }
        .neon-n { color: #ff9900; }

        .btn-wa {
            background: #25D366;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(37,211,102,0.3);
        }
    </style>
</head>

    <header id="miHeader" class="header-principal">
