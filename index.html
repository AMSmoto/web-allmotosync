    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;

            color: #e0e0e0; font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center; scroll-behavior: smooth; overflow-x: hidden;
        }

        /* --- HEADER --- */
        .header-principal {
            position: fixed; top: 0; width: 100%; background-color: rgba(0,0,0,0.95);
            z-index: 1000; padding: 20px 0 0 0; border-bottom: 4px solid #FF6600;
        }
        #logo-ams { width: 400px; max-width: 80%; border-radius: 15px; filter: drop-shadow(0px 0px 15px rgba(255, 102, 0, 0.5)); transition: 0.4s; }

        /* --- SLIDER INFINITO (CORREGIDO) --- */
        .slider-marcas { 
            width: 100%; background: rgba(255, 102, 0, 0.1); 
            padding: 15px 0; overflow: hidden; margin-top: 15px; 
            display: flex;
        }
        .contenedor-logos { 
            display: flex; 
            animation: scroll-infinito 20s linear infinite; 
            white-space: nowrap;
        }
        .contenedor-logos span { 
            font-size: 1.4rem; font-weight: 900; padding: 0 40px; 
            color: rgba(255, 255, 255, 0.5); letter-spacing: 2px;
        }
        @keyframes scroll-infinito {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* El truco del 50% con contenido duplicado */
        }

        /* --- REDES SOCIALES (TODAS) --- */
        .social-bar { position: fixed; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; z-index: 2000; }
        .social-icon { 
            width: 50px; height: 50px; display: flex; justify-content: center; 
            align-items: center; border-radius: 10px 0 0 10px; margin-bottom: 5px; 
            text-decoration: none; transition: 0.3s; 
        }
        .social-icon:hover { width: 65px; }
        .wa { background: #25D366; } 
        .ig { background: #E4405F; } 
        .fb { background: #1877F2; } 
        .tk { background: #000; border-left: 2px solid #FF6600; }
        .x-social { background: #000; border-left: 2px solid #fff; }
        .social-icon svg { width: 25px; height: 25px; fill: white; }

        .relleno-header { height: 450px; }

        /* --- SERVICIOS (LOS 3) --- */
        .contenedor-servicios { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px 20px; }
        .tarjeta-click { 
            width: 300px; height: 380px; border-radius: 15px; 
            background-size: cover; background-position: center; 
            position: relative; overflow: hidden; border: 2px solid #333; text-decoration: none;
        }
        .overlay { 
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            justify-content: flex-end; padding: 20px; box-sizing: border-box; 
        }
        .overlay h2 { color: #FF6600; margin: 0; font-size: 1.5rem; }

        /* --- VIDEOS --- */
        .contenedor-galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .item-trabajo { height: 350px; border-radius: 15px; overflow: hidden; border: 2px solid #FF6600; position: relative; background: #000; }
        .item-trabajo video { width: 100%; height: 100%; object-fit: cover; }
