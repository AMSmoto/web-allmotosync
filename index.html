<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLMOTOSYNC | Diagnóstico Avanzado</title>
    <!-- Iconos profesionales para que las redes NO FALLEN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background: radial-gradient(circle at top, #1a2a44 0%, #0d121c 45%, #050508 100%) no-repeat fixed;
            color: #e0e0e0; font-family: 'Segoe UI', sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* --- HEADER --- */
        .header-principal {
            position: fixed; top: 0; width: 100%; background-color: rgba(0,0,0,0.95);
            z-index: 1000; padding: 15px 0 0 0; border-bottom: 4px solid #FF6600;
        }
        #logo-ams { width: 350px; max-width: 80%; border-radius: 10px; filter: drop-shadow(0 0 10px #FF6600); }

        /* --- MARCAS INFINITAS (REPARADO) --- */
        .slider-marcas {
            width: 100%; background: rgba(255, 102, 0, 0.1);
            padding: 15px 0; margin-top: 10px; overflow: hidden;
            display: flex;
        }
        .contenedor-logos {
            display: flex;
            animation: scroll-marcas 20s linear infinite;
            white-space: nowrap;
        }
        .contenedor-logos span {
            padding: 0 40px; font-size: 1.4rem; font-weight: 900; 
            color: rgba(255,255,255,0.4); text-transform: uppercase;
        }
        @keyframes scroll-marcas {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        /* --- BARRA SOCIAL LATERAL --- */
        .social-bar { position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; }
        .social-icon {
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            margin-bottom: 5px; border-radius: 10px 0 0 10px; text-decoration: none; color: white; font-size: 22px; transition: 0.3s;
        }
        .social-icon:hover { width: 65px; filter: brightness(1.2); }
        .wa { background: #25D366; }
        .ig { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .tk { background: #000; border-left: 2px solid #ff0050; }
        .x-soc { background: #000; border-left: 2px solid #fff; }

        .relleno-header { height: 420px; }
