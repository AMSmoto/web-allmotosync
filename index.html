<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLMOTOSYNC | Diagnóstico Avanzado</title>
    <style>
        /* --- CONFIGURACIÓN DE FONDO MOTO-TECH (DEGRADADO AZUL/GRIS) --- */
        body {
            /* Degradado profundo: Asfalto -> Azul Noche -> Negro */
            background: linear-gradient(180deg, #0f141e 0%, #0a0a0f 50%, #050508 100%) !important;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            min-height: 100vh;
        }

        /* --- HEADER Y LOGO GIGANTE --- */
        .header-principal {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(10, 10, 15, 0.98); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding: 30px 0;
            border-bottom: 3px solid #FF6600;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }

        .header-pequeno {
            padding: 10px 0 !important;
            background-color: rgba(7, 7, 10, 0.95) !important;
        }

        #logo-ams {
            width: 500px; /* TAMAÑO IMPONENTE AL INICIO */
            max-width: 90%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            height: auto;
            filter: drop-shadow(0px 0px 15px rgba(255, 102, 0, 0.4));
        }

        .logo-reducido {
            width: 240px !important; /* SE ACHICA PERO SIGUE SIENDO LEGIBLE */
        }

        #subtitulo-header {
            transition: all 0.3s ease;
            opacity: 1;
            color: #FF6600;
            font-weight: bold;
            margin-top: 15px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-pequeno #subtitulo-header {
            opacity: 0;
            visibility: hidden;
            height: 0;
            margin: 0;
        }

        .relleno-header {
            height: 340px; /* ESPACIO PARA QUE EL LOGO NO TAPE EL CONTENIDO */
        }

        .hero-section {

            background-size: cover;
            background-position: center;
            padding: 100px 20px;
            border-bottom: 2px solid #FF6600;
        }
